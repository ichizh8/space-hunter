name: Export and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v4

      - name: Verify export templates
        run: |
          echo "Godot version:"
          godot --version
          echo "Export templates:"
          ls -la /root/.local/share/godot/export_templates/ || echo "No templates dir"
          ls -la /root/.local/share/godot/export_templates/*/ || echo "No version dirs"

      - name: Import project
        run: godot --headless --import 2>&1 || true

      - name: Export to Web
        run: |
          mkdir -p docs
          godot --headless --export-release "Web" docs/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: export-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
